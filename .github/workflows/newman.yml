name: Newman API tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: newman-pages
  cancel-in-progress: false

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start mock API
        run: npm run start-api > api.log 2>&1 &

      - name: Wait for mock API
        run: npm run wait-api

      - name: Run Store API Newman collection
        id: store_tests
        continue-on-error: true
        run: npm run test:api:store

      - name: Run Petstore API Newman collection
        id: petstore_tests
        continue-on-error: true
        run: npm run test:api:petstore

      - name: Generate reports dashboard
        if: always()
        env:
          STORE_OUTCOME: ${{ steps.store_tests.outcome }}
          PETSTORE_OUTCOME: ${{ steps.petstore_tests.outcome }}
        run: npm run generate-dashboard

      - name: Upload Newman report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: newman-report
          if-no-files-found: error

      - name: Deploy Newman report to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./newman-report
          force_orphan: true

      - name: Fail workflow if Newman tests failed
        if: always() && (steps.store_tests.outcome != 'success' || steps.petstore_tests.outcome != 'success')
        run: exit 1
