name: Newman API tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: newman-pages
  cancel-in-progress: false

jobs:
  api-tests:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      API_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start mock API
        run: npm run start-api > api.log 2>&1 &

      - name: Wait for mock API
        run: npm run wait-api

      - name: Run Store API Newman collection
        id: store_tests
        continue-on-error: true
        run: npm run test:api:store:ci

      - name: Run Petstore API Newman collection
        id: petstore_tests
        continue-on-error: true
        run: |
          for attempt in 1 2; do
            echo "Petstore Newman attempt ${attempt}/2"
            if npm run test:api:petstore; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Generate reports dashboard
        if: always()
        env:
          STORE_OUTCOME: ${{ steps.store_tests.outcome }}
          PETSTORE_OUTCOME: ${{ steps.petstore_tests.outcome }}
        run: npm run generate-dashboard

      - name: Publish Newman JUnit test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Newman API Tests
          path: newman-report/*-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Newman report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: newman-report
          retention-days: 30
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: newman-report

      - name: Deploy Newman report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Comment PR with report artifact link
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Newman report artifact: ${artifactUrl}`
            });

      - name: Fail workflow if Newman tests failed
        if: always() && (steps.store_tests.outcome != 'success' || steps.petstore_tests.outcome != 'success')
        run: exit 1
